name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main
      - refactor/trek-plp-components

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:run

      - name: Build production bundle
        run: npm run build
